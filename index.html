<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md. Ahosan Kobir Papon | Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* GitHub Dark theme background */
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        header {
            margin-bottom: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #58a6ff;
            margin-bottom: 15px;
        }
        header h1 {
            font-size: 24px;
            color: #f0f6fc;
            margin-bottom: 5px;
        }
        header p {
            font-size: 14px;
            color: #8b949e;
        }
        .grid-links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .grid-links a {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            background: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease-in-out;
        }
        .grid-links a:hover {
            background: #30363d;
            border-color: #8b949e;
            color: #58a6ff;
            transform: translateY(-2px);
        }
        .grid-links a span.icon {
            font-size: 18px;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <!-- এখানে আপনার গিটহাবের প্রোফাইল ছবি স্বয়ংক্রিয়ভাবে লোড হবে -->
            <img class="avatar" src="https://github.com/AK-Papon.png" alt="AK-Papon">
            <h1>Md. Ahosan Kobir Papon</h1>
            <p>Tech Enthusiast & Hardware Researcher</p>
        </header>

        <main>
            <div class="grid-links">
                <a href="https://github.com/AK-Papon" target="_blank">
                    <span class="icon">💻</span>
                    <span>My GitHub Profile</span>
                </a>
                <a href="#portfolio">
                    <span class="icon">⭐</span>
                    <span>My Portfolio</span>
                </a>
                <a href="#blog">
                    <span class="icon">✍️</span>
                    <span>The Archive & Blog</span>
                </a>
                <a href="#projects">
                    <span class="icon">🔬</span>
                    <span>Research & Projects</span>
                </a>
                <a href="#apps">
                    <span class="icon">📱</span>
                    <span>App Development Lab</span>
                </a>
                <a href="#contact">
                    <span class="icon">📇</span>
                    <span>Global Contact</span>
                </a>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 AK-Papon. Built with GitHub Pages.</p>
        </footer>
    </div>

</body>
</html>
